
<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<script type="text/javascript" src="/jquery.js"></script>
	<script type="text/javascript" src="/av-min.js"></script>
	<script type="text/javascript" src="/js/signup.js"></script>
	<script type="text/javascript">
		AV.init({
			appId: "",
			appKey: "",
			serverURLs: ""
		})
		var MW = AV
	</script>

	<style type="text/css">
		.myInput {
			height: 33px;
			width: 100%;
			font-size: 20px;
			outline: none;
			text-align: center;
			border-bottom: 2px solid rgb(43, 43, 43);
			border-top: none;
			border-left: none;
			border-right: none;
			background-color: rgba(0, 0, 0, 0);
		}

		.bton {
			padding: 0.6rem 0.9rem;
			font-size: 0.9rem;
			color: rgb(255, 255, 255);
			background-color: rgb(0, 117, 226);
			transition: 0.2s;
			width: 100%;
			border-radius: 44px;
			border: none;
		}

		.bton:hover {
			text-decoration: none;
			background-color: rgb(0, 95, 184);
		}

		.login {
			width: 50%;
			padding-bottom: 0;
			position: absolute;
			margin: auto;
			text-align: center;
			background-color: white;
			border-radius: 5px;
			top: 0;
			bottom: 0;
			left: 0;
			right: 0;
		}
	</style>
</head>

<body>
	<div class="login">
		<div style="margin: 20;">
			<p>账户信息不互通</p>
			<input type="text" id="username" placeholder="用户名" class="myInput">
			<input type="text" id="nickname" placeholder="昵称" class="myInput">
			<input type="password" id="password" placeholder="密码" class="myInput">
			<input type="text" id="email" placeholder="邮箱" class="myInput">
			<button type="button" id="submit" class="bton">注册</button>
			<p>已有账号？<a href="/mword/mword-login.html">登录</a></p>
		</div>
	</div>
</body>

</html>
