<script type="text/javascript">
$(function() {
    function getQueryString(name) {
        var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)")
        var r = window.location.search.substr(1).match(reg)
        if(r != null) {
            return unescape(r[2])
        }
    }
    function getMSSTime(s) {
        var timeresultM = 0, timeresultS = 0
        while(s >= 60) {
            s = s - 60
            timeresultM++
        }
        if(s < 10) {
            timeresultS = "0" + s
        } else if(s >= 10) {
            timeresultS = s
        } 
        return timeresultM + ":" + timeresultS
    }
    function descend(x, y){
        return y[1] - x[1]
    }
    if(getQueryString("id") != null) {
        var query = new MW.Query("MwordsResult")
        var user = new MW.Query("_User")
        query.get(getQueryString("id")).then(function(res) {
            var id = res.get("userid")
            var diyhelp = res.get("diyhelp")
            if(diyhelp == 0) {
                diyhelp = "全部"
            }
            var ouser = new Array()
            var lb = new Array()
            query.descending("diyhelp")
            query.find().then(function (object) {
                $(object).each(function(index) {
                    var nononly = false
                    $(ouser).each(function(idx) {
                        if (ouser[idx] == object[index]._serverData.userid) {
                            nononly = true
                        }
                    })
                    if (nononly == false) {
                        ouser.push(object[index]._serverData.userid)
                    }
                })
                $(ouser).each(function(index) {
                    user.get(ouser[index]).then(function(userres) {
                        ouser[index] = userres.get("username")
                        query.equalTo("username", ouser[index])
                        query.ascending("speed")
                        query.first().then(function (object) {
                            lb.push(new Array(ouser[index], object._serverData.speed))
                            lb.sort(descend)
                            $(lb).each(function(index) {
                                if (index == lb.length - 1) {
                                    $("#leader").html($("#leader").html() + lb[index][0] + " " + lb[index][1] + "个单词/秒")
                                } else {
                                    $("#leader").html($("#leader").html() + lb[index][0] + " " + lb[index][1] + "个单词/秒\n")
                                }
                            })
                        })
                    })
                })
            })
            user.get(id).then(function(userres) {
                $("#result").html("我是" + userres.get("nickname") 
                                + " 我的唯一用户名是" + userres.get("username")
                                + " 我在" + res.createdAt.toLocaleString()
                                + " 默写了" + res.get("unit") + "的单词" 
                                + " 用时" + getMSSTime(res.get("timer"))
                                + " 使用提示字数" + diyhelp
                                + " 提示了" + res.get("help") + "次")
                $("#result2").html("数据更新于" + res.updatedAt.toLocaleString())
                $("#result3").html("\n\n数据ID " + res.id)
            })
        })
    }
})
</script>
